databaseChangeLog:
  - changeSet:
      id: 003-add-client-fields
      author: olkulagina
      changes:
        - dropColumn:
            tableName: client
            columnName: full_name
        - addColumn:
            tableName: client
            columns:
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: varchar(255)
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: gender
                  type: varchar(20)
              - column:
                  name: source
                  type: varchar(50)
              - column:
                  name: birth_date
                  type: date
              - column:
                  name: loyalty_card_number
                  type: varchar(255)
              - column:
                  name: registration_date
                  type: date
              - column:
                  name: last_activity_date
                  type: date
              - column:
                  name: region_id
                  type: bigint
                  constraints:
                    nullable: true
                    foreignKeyName: fk_client_region
                    references: region(id)
              - column:
                  name: company_id
                  type: bigint
                  constraints:
                    nullable: true
                    foreignKeyName: fk_client_company
                    references: company(id)