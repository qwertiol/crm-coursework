<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Client Details')}"></head>
<body>
    <nav th:replace="~{layout :: nav}"></nav>
    <main>
        <div th:replace="~{layout :: messages}"></div>
        <h1>Client Details</h1>
        
        <div class="details">
            <p><strong>Full Name:</strong> <span th:text="${client.fullName}">John Doe</span></p>
            <p><strong>Phone:</strong> <span th:text="${client.phone}">+1234567890</span></p>
            <p><strong>Company:</strong> <span th:text="${client.company}">Acme Corp</span></p>
            <p><strong>Current Status:</strong> <span th:text="${client.status != null} ? ${client.status.name} : 'No status'">Active</span></p>
        </div>
        
        <div class="actions">
            <a th:href="@{/clients/{id}/edit(id=${client.id})}">Edit</a>
            <a th:href="@{/clients}">Back to list</a>
        </div>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
