<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Clients')}"></head>
<body>
    <nav th:replace="~{layout :: nav}"></nav>
    <main>
        <div th:replace="~{layout :: messages}"></div>
        <h1>Clients</h1>
        
        <p class="results-count">Total clients: <span th:text="${#lists.size(clients)}"></span></p>
        
        <p th:if="${#lists.isEmpty(clients)}">No clients found.</p>
        
        <table th:if="${!#lists.isEmpty(clients)}">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="client : ${clients}" th:onclick="|window.location='@{/clients/{id}(id=${client.id})}'|" style="cursor: pointer;">
                    <td th:text="${client.fullName}">John Doe</td>
                    <td th:text="${client.phone}">+1234567890</td>
                    <td th:text="${client.email != null} ? ${client.email} : '—'">email@example.com</td>
                    <td th:text="${client.company}">Acme Corp</td>
                    <td>
                        <span th:if="${client.status != null}" 
                              th:text="${client.status.name}" 
                              th:style="'color: ' + ${client.status.color} + '; font-weight: 600;'">Active</span>
                        <span th:if="${client.status == null}">No status</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
