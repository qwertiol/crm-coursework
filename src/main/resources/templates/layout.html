<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head (title)">
    <meta charset="UTF-8">
    <title th:text="${title}">CRM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav th:fragment="nav">
        <div class="nav-container">
            <a th:href="@{/clients}" class="logo">CRM System</a>
            <div class="nav-links">
                <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
                <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Register</a>
                <a sec:authorize="isAuthenticated()" th:href="@{/clients}">Clients</a>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div th:fragment="messages">
        <div th:if="${successMessage}" class="alert success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>
    </div>

    <footer th:fragment="footer">
        <p>CRM System © 2026</p>
    </footer>
</body>
</html>
