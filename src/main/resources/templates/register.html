<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register')}"></head>
<body>
    <nav th:replace="~{layout :: nav}"></nav>
    <main>
        <div th:replace="~{layout :: messages}"></div>
        <div th:if="${param.error}" class="alert error">Registration failed. Please try again.</div>
        <h1>Register</h1>
        <form th:action="@{/register}" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a th:href="@{/login}">Login</a></p>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
